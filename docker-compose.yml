x-customer-runtime: &customer-runtime
  image: ${CUSTOMER_SERVICE_IMAGE:-customer-service:latest}
  build:
    context: .
  environment:
    CUSTOMER_SERVICE_EVENT_PUBLISHER_BACKEND: ${CUSTOMER_SERVICE_EVENT_PUBLISHER_BACKEND:-rabbitmq}
    CUSTOMER_SERVICE_JWT_SECRET: ${CUSTOMER_SERVICE_JWT_SECRET:?set CUSTOMER_SERVICE_JWT_SECRET}
    CUSTOMER_SERVICE_DATABASE_URL: ${CUSTOMER_SERVICE_DATABASE_URL:-}
    MYSQL_HOST: ${MYSQL_HOST:?set MYSQL_HOST}
    MYSQL_LOCAL_PORT: ${MYSQL_LOCAL_PORT:-3306}
    MYSQL_DATABASE: ${MYSQL_DATABASE:?set MYSQL_DATABASE}
    MYSQL_USER: ${MYSQL_USER:?set MYSQL_USER}
    MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    CUSTOMER_SERVICE_RABBITMQ_URL: ${CUSTOMER_SERVICE_RABBITMQ_URL:-}
    RABBITMQ_HOST: ${RABBITMQ_HOST:?set RABBITMQ_HOST}
    RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
    RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}
    RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}
    CUSTOMER_SERVICE_RABBITMQ_REQUEST_EXCHANGE: ${CUSTOMER_SERVICE_RABBITMQ_REQUEST_EXCHANGE:-customer.exchange}
    CUSTOMER_SERVICE_RABBITMQ_REQUEST_EXCHANGE_TYPE: ${CUSTOMER_SERVICE_RABBITMQ_REQUEST_EXCHANGE_TYPE:-direct}
    CUSTOMER_SERVICE_RABBITMQ_REQUEST_ROUTING_KEY: ${CUSTOMER_SERVICE_RABBITMQ_REQUEST_ROUTING_KEY:-customer.request}
    CUSTOMER_SERVICE_RABBITMQ_RESPONSE_EXCHANGE: ${CUSTOMER_SERVICE_RABBITMQ_RESPONSE_EXCHANGE:-customer.exchange}
    CUSTOMER_SERVICE_RABBITMQ_RESPONSE_EXCHANGE_TYPE: ${CUSTOMER_SERVICE_RABBITMQ_RESPONSE_EXCHANGE_TYPE:-direct}
    CUSTOMER_SERVICE_RABBITMQ_RESPONSE_ROUTING_KEY: ${CUSTOMER_SERVICE_RABBITMQ_RESPONSE_ROUTING_KEY:-customer.response.key}

services:
  customer-migration:
    <<: *customer-runtime
    command: [".venv/bin/alembic", "upgrade", "head"]
    restart: "no"

  customer-service:
    <<: *customer-runtime
    command: [".venv/bin/uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      customer-migration:
        condition: service_completed_successfully
    ports:
      - "${CUSTOMER_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 204 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  customer-worker:
    <<: *customer-runtime
    command: [".venv/bin/python", "consumer.py"]
    depends_on:
      customer-migration:
        condition: service_completed_successfully
    restart: unless-stopped
