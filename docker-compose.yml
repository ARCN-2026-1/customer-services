services:
  customer-service:
    build:
      context: .
    container_name: customer-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      CUSTOMER_SERVICE_DATABASE_URL: sqlite:///./data/customer-service.sqlite
      CUSTOMER_SERVICE_EVENT_PUBLISHER_BACKEND: rabbitmq
      CUSTOMER_SERVICE_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      CUSTOMER_SERVICE_RABBITMQ_EXCHANGE: customer.events
      CUSTOMER_SERVICE_JWT_SECRET: local-dev-secret
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: customer-service-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  rabbitmq-data:
