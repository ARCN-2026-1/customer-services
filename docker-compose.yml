version: "3.8"

services:
  customer-api:
    image: ${CUSTOMER_SERVICE_IMAGE:-customer-service:latest}
    container_name: customer-api
    environment:
      HOME: /tmp
      UV_CACHE_DIR: /tmp/uv-cache
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: always

  customer-worker:
    image: ${CUSTOMER_SERVICE_IMAGE:-customer-service:latest}
    container_name: customer-worker
    command: ["uv", "run", "python", "consumer.py"]
    environment:
      HOME: /tmp
      UV_CACHE_DIR: /tmp/uv-cache
    env_file:
      - .env
    restart: always

  customer-migration:
    image: ${CUSTOMER_SERVICE_IMAGE:-customer-service:latest}
    container_name: customer-migration
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      HOME: /tmp
      UV_CACHE_DIR: /tmp/uv-cache
    env_file:
      - .env
