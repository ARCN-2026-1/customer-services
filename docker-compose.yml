version: "3.8"

services:
  customer-api:
    image: ${{ secrets.DOCKER_HUB_USERNAME }}/customer-service:latest
    container_name: customer-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: always

  customer-worker:
    image: ${{ secrets.DOCKER_HUB_USERNAME }}/customer-service:latest
    container_name: customer-worker
    command: ["uv", "run", "python", "run_customer_consumer.py"]
    env_file:
      - .env
    restart: always

  customer-migration:
    image: ${{ secrets.DOCKER_HUB_USERNAME }}/customer-service:latest
    container_name: customer-migration
    command: ["uv", "run", "alembic", "upgrade", "head"]
    env_file:
      - .env
